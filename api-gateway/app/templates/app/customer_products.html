{% extends "app/base.html" %}

{% block title %}Product List{% endblock %}

{% block header_sub %}{% endblock %}

{% block head %}
<style>
  .z-grid { grid-template-columns: 320px 1fr; }
  .z-lead { display: block; }
  .z-brand { display: none; }
  .z-header { justify-content: center; }
  .z-nav { width: min(100%, 980px); margin: 0 auto; justify-content: space-between; }
  .nav-left,
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .nav-left { min-width: 0; flex: 1; }
  .nav-right { margin-left: auto; }
  .icon-actions { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .icon-btn { width: 40px; height: 40px; border: 1px solid var(--line); border-radius: 999px; background: var(--panel); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .icon-btn svg { width: 20px; height: 20px; stroke: var(--ink); }
  .user-menu-wrap { position: relative; }
  .user-menu { position: absolute; right: 0; top: 48px; width: 220px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); box-shadow: var(--panel-shadow); padding: 8px; display: none; z-index: 20; }
  .user-menu.show { display: grid; gap: 6px; }
  .user-menu button,
  .user-menu a { border: 1px solid var(--line); border-radius: 10px; background: var(--danger-bg); min-height: 36px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 700; color: var(--danger-fg); cursor: pointer; border-color: #fecdd3; }
  .filter-box { display: grid; gap: 10px; }
  .filter-title { font-weight: 900; margin-bottom: 2px; }
  .field-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 12px; }
  .card { border: 1px solid var(--line); border-radius: 12px; background: var(--panel); overflow: hidden; display: grid; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: var(--panel-shadow-hover); border-color: var(--line-strong); }
  .card-image { position: relative; height: 150px; background: linear-gradient(120deg, #f3f7ff, #eef7ee); display: grid; place-items: center; font-size: 42px; }
  .ai-pick-badge { position: absolute; top: 8px; right: 8px; background: #f59e0b; color: #111827; font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 999px; }
  .card-body { padding: 10px; display: grid; gap: 8px; }
  .card-name { font-weight: 800; min-height: 40px; }
  .card-type { display: inline-flex; align-items: center; width: fit-content; border-radius: 999px; padding: 4px 8px; font-size: 11px; font-weight: 800; letter-spacing: 0.02em; background: #e0f2fe; color: #075985; }
  .card-price { font-weight: 900; color: var(--brand-2); }
  .card-stock { color: #166534; font-size: 13px; font-weight: 700; }
  .card-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .add-cart-btn { width: 36px; height: 36px; border: 1px solid var(--line); border-radius: 999px; background: #f1f8f2; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .add-cart-btn svg { width: 18px; height: 18px; stroke: var(--brand-2); }
  .add-cart-btn:hover { background: #dff1e2; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .toolbar .input { min-width: 220px; }
  .ai-box { margin-top: 10px; border: 1px solid var(--line); border-radius: 12px; background: #f8fbff; padding: 10px; }
  .ai-title { font-weight: 800; margin-bottom: 6px; }
  .ai-list { margin: 0; padding-left: 18px; display: grid; gap: 4px; }
  .toast-wrap { position: fixed; top: 16px; right: 16px; display: grid; gap: 8px; z-index: 999; }
  .toast { min-width: 240px; max-width: 320px; border-radius: 10px; padding: 10px 12px; color: #fff; font-weight: 700; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18); opacity: 0; transform: translateY(-6px); animation: toastIn 0.25s ease forwards; }
  .toast.ok { background: var(--brand); }
  .toast.error { background: #b91c1c; }
  @keyframes toastIn { to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 980px) {
    .z-grid { grid-template-columns: 1fr; }
    .z-nav { justify-content: flex-start; }
    .nav-left,
    .nav-right { width: 100%; flex-wrap: wrap; }
    .nav-right { margin-left: 0; justify-content: flex-start; }
  }
</style>
{% endblock %}

{% block nav %}
  <div class="nav-left">
    <a class="nav-link" href="/ui/customer/">Home</a>
    <input id="keywordInput" class="input" type="search" placeholder="Search products by name, type, or subtype..." style="min-width:220px;">
  </div>
  <div class="nav-right">
    <div class="icon-actions">
      <button class="nav-link" type="button" onclick="openCustomerChatbot('http://localhost:8005/ai/chat/ui/?customer_id={{ user_id|default:'0' }}')">Chatbot</button>
      <button class="nav-link" type="button" onclick="loadAiSuggestions()">AI Recommendations</button>
      <a class="icon-btn" href="/ui/customer/cart/" title="Cart" aria-label="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="20" r="1"></circle>
          <circle cx="18" cy="20" r="1"></circle>
          <path d="M3 4h2l2.2 10.2a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 2-1.6L22 7H7"></path>
        </svg>
      </a>
      <div class="user-menu-wrap" id="userMenuWrap">
        <button id="userMenuBtn" class="icon-btn" type="button" onclick="toggleUserMenu(event)" title="Account" aria-label="Account">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21a8 8 0 1 0-16 0"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
        <div id="userMenu" class="user-menu">
          <button type="button" onclick="openProfileEditor()">Edit profile</button>
          <a href="/ui/logout/">Logout</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block lead %}
  <div class="filter-box">
    <div class="filter-title">Filter</div>

    <label>Product Type</label>
    <select id="typeFilter" class="select">
      <option value="all">All</option>
      <option value="BOOK">Book</option>
      <option value="ELECTRONICS">Electronics</option>
      <option value="FASHION">Fashion</option>
    </select>

    <label>Price</label>
    <div class="field-inline">
      <input id="priceMin" class="input" type="number" min="0" placeholder="Min">
      <input id="priceMax" class="input" type="number" min="0" placeholder="Max">
    </div>

    <label>Stock</label>
    <select id="stockFilter" class="select">
      <option value="all">All</option>
      <option value="in_stock">In stock</option>
      <option value="out_stock">Out of stock</option>
    </select>

    <button class="button brand" type="button" onclick="applyFilters()">Apply filter</button>
  </div>
{% endblock %}

{% block primary %}
  <h2 class="h2">Product List</h2>
  <p class="sub">Filter + sorting + grid view.</p>
