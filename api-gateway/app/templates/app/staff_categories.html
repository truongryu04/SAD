<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management</title>
    <link rel="stylesheet" href="{% static 'app/staff_common.css' %}">
</head>
<body>

<div class="dashboard-shell">

    <!-- SIDEBAR -->
    {% include "app/partials/console_sidebar.html" with active="categories" role=role %}

    <!-- MAIN -->
    <main class="main-content">

        <!-- HEADER -->
        <header class="topbar">
            <div class="left-tools">
                <button id="menuToggle" class="menu-toggle">☰</button>
                <div class="search-box">
                    <span>🔍</span>
                    <input id="keywordInput" type="text" placeholder="Search by name or ID...">
                </div>
            </div>

            <div class="header-actions">
                <button class="icon-btn">🔔<span class="badge">5</span></button>

                <div id="profileTrigger" class="profile-wrap">
                    <div class="avatar">AD</div>
                    <div class="profile-meta">
                        <strong>Admin</strong>
                        <span>System</span>
                    </div>
                </div>

                <div id="profileMenu" class="profile-menu">
                    <a href="/ui/logout/" style="color: var(--danger);">Logout</a>
                </div>
            </div>
        </header>

        <!-- BODY -->
        <section class="dashboard-body">

            <!-- HERO -->
            <div class="hero">
                <div>
                    <h2>Category List</h2>
                    <p>Manage categories: create, update, delete.</p>
                </div>
                <button id="addBtn" class="btn btn-primary" type="button">+ Add Category</button>
            </div>

            <!-- FILTER -->
            <section class="panel">
                <div class="controls">
                    <input id="searchInput" class="field" placeholder="Search...">
                    <select id="productTypeFilter" class="select">
                        <option value="all">All product types</option>
                        <option value="BOOK">BOOK</option>
                        <option value="ELECTRONICS">ELECTRONICS</option>
                        <option value="FASHION">FASHION</option>
                    </select>
                    <button id="reloadBtn" class="btn">Reload</button>
                </div>
                <div id="statusBox" class="status-box"></div>
            </section>

            <!-- TABLE -->
            <section class="panel">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Product Type</th>
                            <th>Parent</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody id="categoryTableBody"></tbody>
                    </table>
                </div>

                <div class="pagination">
                    <div id="pageInfo">Showing 0 categories</div>
                </div>
            </section>

        </section>
    </main>
</div>

<div id="sidebarBackdrop" class="sidebar-backdrop"></div>

<!-- MODAL -->
<div id="categoryModal" class="modal">
    <div class="modal-card">
        <h3 id="modalTitle">Add Category</h3>

        <form id="categoryForm">
            <div class="form-grid">
                <input id="fName" class="field" placeholder="Category name" required>
                <select id="fProductType" class="select" required>
                    <option value="ELECTRONICS">ELECTRONICS</option>
                    <option value="BOOK">BOOK</option>
                    <option value="FASHION">FASHION</option>
                </select>
                <select id="fParentId" class="select full">
                    <option value="">No parent</option>
                </select>
            </div>

            <div class="modal-actions">
                <button type="button" id="cancelBtn" class="btn">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="{% static 'app/staff_common.js' %}"></script>
<script>
    initStaffCommonUI();

    const state = {
        categories: [],
        filtered: [],
        editingId: null,
    };

    const table = document.getElementById("categoryTableBody");
    const statusBox = document.getElementById("statusBox");
    const addBtn = document.getElementById("addBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const searchInput = document.getElementById("searchInput");
    const productTypeFilter = document.getElementById("productTypeFilter");
    const categoryModal = document.getElementById("categoryModal");
    const categoryForm = document.getElementById("categoryForm");
    const modalTitle = document.getElementById("modalTitle");
    const cancelBtn = document.getElementById("cancelBtn");
    const fName = document.getElementById("fName");
    const fProductType = document.getElementById("fProductType");
    const fParentId = document.getElementById("fParentId");

    function showStatus(message, type) {
        statusBox.className = "status-box" + (type ? " " + type : "");
        statusBox.textContent = message;
    }

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data = {};
        try {
            data = JSON.parse(text || "{}");
        } catch (error) {
            data = { message: text || "Request failed." };
        }

        if (!response.ok) {
            throw new Error(data.error || data.message || "Request failed.");
        }

        return data;
    }

    function normalizeCategory(item) {
        const parentValue = item.parent_id ?? item.parent ?? null;
        const nestedParent = parentValue && typeof parentValue === "object" ? parentValue.id : parentValue;
        const parentId = nestedParent === null || nestedParent === undefined || nestedParent === "" ? null : Number(nestedParent);
        return {
            id: Number(item.id || 0),
            name: String(item.name || ""),
            productType: String(item.product_type || "ELECTRONICS").toUpperCase(),
            parentId: parentId,
        };
    }

    function renderParentOptions(productType, selectedParentId, excludeId) {
        const items = state.categories.filter((category) => category.productType === productType && Number(category.id) !== Number(excludeId || 0));
        fParentId.innerHTML = "<option value=''>Không có parent</option>" + items.map((category) => {
            const selected = Number(category.id) === Number(selectedParentId) ? " selected" : "";
            return "<option value='" + Number(category.id) + "'" + selected + ">" + escapeHtml(category.name) + "</option>";
        }).join("");
    }

    function openModal(category) {
        const editing = Boolean(category);
        state.editingId = editing ? Number(category.id) : null;
        modalTitle.textContent = editing ? "Sửa danh mục" : "Thêm danh mục";
        fName.value = editing ? (category.name || "") : "";
        fProductType.value = editing ? category.productType : "ELECTRONICS";
        renderParentOptions(fProductType.value, editing ? category.parentId : "", editing ? category.id : null);
        categoryModal.classList.add("show");
        categoryModal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
        categoryModal.classList.remove("show");
        categoryModal.setAttribute("aria-hidden", "true");
        categoryForm.reset();
        state.editingId = null;
        fProductType.value = "ELECTRONICS";
        renderParentOptions("ELECTRONICS", "", null);
    }

    async function loadCategories() {
        const payload = await fetchJson("/api/categories/");
        state.categories = (Array.isArray(payload && payload.data) ? payload.data : (Array.isArray(payload) ? payload : [])).map(normalizeCategory);
        applyFilters();
        renderParentOptions(fProductType.value || "ELECTRONICS", fParentId.value || "", state.editingId);
        showStatus("Đã tải dữ liệu", "ok");
    }

    function applyFilters() {
        const keyword = searchInput.value.toLowerCase();
        const productType = productTypeFilter.value;

        state.filtered = state.categories.filter((category) => {
            const matchesKeyword = !keyword || category.name.toLowerCase().includes(keyword) || String(category.id).includes(keyword);
            const matchesType = productType === "all" || category.productType === productType;
            return matchesKeyword && matchesType;
        });

        render();
    }

    function render() {
        if (!state.filtered.length) {
            table.innerHTML = "<tr><td colspan='5'>Không có dữ liệu</td></tr>";
            document.getElementById("pageInfo").textContent = "Hiển thị 0 danh mục";
            return;
        }

        table.innerHTML = state.filtered.map((category) => {
            const parent = category.parentId ? state.categories.find((item) => Number(item.id) === Number(category.parentId)) : null;
            return `
            <tr>
                <td>#${category.id}</td>
                <td>${escapeHtml(category.name)}</td>
                <td>${escapeHtml(category.productType)}</td>
                <td>${parent ? escapeHtml(parent.name) : "-"}</td>
                <td>
                    <div class="actions">
                        <button class="btn btn-xs" type="button" onclick="openEdit(${category.id})">Sửa</button>
                        <button class="btn btn-xs btn-danger" type="button" onclick="removeCategory(${category.id})">Xoá</button>
                    </div>
                </td>
            </tr>
        `;
        }).join("");

        document.getElementById("pageInfo").textContent = "Hiển thị " + state.filtered.length + " danh mục";
    }

    function openEdit(id) {
        const category = state.categories.find((item) => Number(item.id) === Number(id));
        if (!category) {
            showStatus("Không tìm thấy danh mục.", "error");
            return;
        }
        openModal(category);
    }

    async function removeCategory(id) {
        if (!confirm("Xoá danh mục #" + id + "?")) {
            return;
        }

        try {
            await fetchJson("/api/categories/" + id + "/", { method: "DELETE" });
            await loadCategories();
            showStatus("Đã xoá danh mục", "ok");
        } catch (error) {
            showStatus(error.message || "Xoá thất bại", "error");
        }
    }

    async function saveCategory(event) {
        event.preventDefault();

        const payload = {
            name: fName.value.trim(),
            product_type: fProductType.value,
        };

        const parentId = fParentId.value ? Number(fParentId.value) : null;
        if (parentId) {
            payload.parent = parentId;
        } else {
            payload.parent = null;
        }

        if (!payload.name) {
            showStatus("Tên danh mục là bắt buộc.", "error");
            return;
        }

        try {
                const wasEditing = Boolean(state.editingId);
            const url = state.editingId ? "/api/categories/" + state.editingId + "/" : "/api/categories/";
            const method = state.editingId ? "PUT" : "POST";
            await fetchJson(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            closeModal();
            await loadCategories();
                showStatus(wasEditing ? "Đã cập nhật danh mục" : "Đã thêm danh mục", "ok");
        } catch (error) {
            showStatus(error.message || "Lưu thất bại", "error");
        }
    }

    addBtn.addEventListener("click", function () {
        openModal(null);
    });
    cancelBtn.addEventListener("click", closeModal);
    categoryForm.addEventListener("submit", saveCategory);
    searchInput.addEventListener("input", applyFilters);
    productTypeFilter.addEventListener("change", applyFilters);
    reloadBtn.addEventListener("click", loadCategories);
    fProductType.addEventListener("change", function () {
        if (state.editingId) {
            renderParentOptions(fProductType.value, fParentId.value || "", state.editingId);
            return;
        }
        renderParentOptions(fProductType.value, "", null);
    });

    document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && categoryModal.classList.contains("show")) {
            closeModal();
        }
    });

    loadCategories().catch(function (error) {
        showStatus(error.message || "Khởi tạo thất bại", "error");
    });
</script>

</body>
</html>
